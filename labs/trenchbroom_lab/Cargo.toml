[package]
name = "trenchbroom_lab"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
bevy = { version = "0.18.1", default-features = false, features = ["3d", "png"] }
# Phase A1 of the asset-integration roadmap: TrenchBroom `.map` authoring. Only the
# default `client` feature (map loading + PBR materials) — no `bsp` (qbsp/ericw-tools)
# and no physics integration; this lab uses the project's own AABB traversal instead.
bevy_trenchbroom = { version = "0.13", default-features = false, features = ["client"] }
observed_core = { path = "../../crates/observed_core" }
player_input = { path = "../../crates/player_input" }
observed_style = { path = "../../crates/observed_style" }
observed_traversal = { path = "../../crates/observed_traversal" }

[dev-dependencies]
# The exact `.map` text parser `bevy_trenchbroom` uses internally. The projection
# tests parse the authored map synchronously (no async asset server / GPU) and build
# the same `QuakeMapEntities` the live asset load produces. Version-unified with
# `bevy_trenchbroom`'s own dependency so the `QuakeMap` type matches.
quake-map = "0.6"
